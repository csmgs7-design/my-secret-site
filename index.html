<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizlet 스타일 문제 풀이 앱 (Firebase 클라우드 연동)</title>
    <style>
        /* ==================================================
           CSS: 초기화 및 기본 UI
           ================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Malgun Gothic', Tahoma, sans-serif;
        }

        body {
            background-image: url('https://images.unsplash.com/photo-1617042375876-a13e36732a04?q=80&w=1920&auto=format&fit=crop');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            background-color: #0078D7;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-image 0.5s ease;
        }

        /* ==================================================
           바탕화면 & 작업표시줄
           ================================================== */
        #desktop {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 20px;
        }

        .desktop-icon {
            width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px 5px;
            border-radius: 5px;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
            transition: background 0.2s;
            position: relative;
        }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.2); }
        .desktop-icon .icon-img { font-size: 45px; margin-bottom: 5px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
        .desktop-icon .icon-text { font-size: 13px; text-align: center; word-break: keep-all; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px;}
        
        .rename-btn { font-size: 11px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .rename-btn:hover { opacity: 1; transform: scale(1.2); }

        #taskbar {
            height: 50px;
            background-color: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            z-index: 100;
        }
        .taskbar-btn { font-size: 20px; cursor: pointer; padding: 8px 15px; border-radius: 4px; margin-right: 10px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .taskbar-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .taskbar-btn.text-btn { font-size: 14px; }
        .clock { margin-left: auto; font-size: 13px; font-weight: bold; }

        /* ==================================================
           윈도우 창 공통 스타일
           ================================================== */
        .window {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 550px; background: #ffffff; border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); display: none; flex-direction: column;
            z-index: 50; overflow: hidden; animation: pop 0.2s ease-out;
        }
        .window.active { display: flex; }
        @keyframes pop { from { transform: translate(-50%, -45%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
        
        .title-bar { background: #f3f3f3; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .title-bar .title { font-size: 15px; font-weight: bold; color: #333; }
        .close-btn { background: transparent; border: none; font-size: 18px; cursor: pointer; border-radius: 4px; width: 30px; height: 30px; transition: 0.2s; }
        .close-btn:hover { background: #e81123; color: white; }
        
        .window-content { padding: 25px; flex: 1; overflow-y: auto; max-height: 70vh; }
        button.btn { padding: 10px 20px; background: #0078D7; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 15px; font-weight: bold; transition: 0.2s; }
        button.btn:hover { background: #005a9e; }
        input[type="file"] { width: 100%; padding: 12px; margin-top: 10px; border: 1px dashed #aaa; border-radius: 6px; background: #fafafa; }

        /* 통계 UI & 목록(List) UI 공통 */
        .stat-group { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stat-group-title { font-weight: bold; font-size: 16px; color: #333; }
        .stat-group-count { color: #e81123; font-weight: bold; font-size: 14px; }
        .top-120-btn { width: 100%; background: #d83b01; margin-bottom: 20px; font-size: 16px; padding: 15px;}
        .top-120-btn:hover { background: #a82e01; }

        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .list-item:hover { background: #f0f8ff; border-left: 4px solid #0078D7; }
        .list-title { font-weight: bold; color: #333; }
        .list-preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
        
        .img-status { font-size: 12px; padding: 3px 8px; border-radius: 12px; background: #eee; font-weight: bold; }
        .img-status.has-img { background: #23b26d; color: white; }

        /* ==================================================
           퀴즈 전체화면 UI
           ================================================== */
        #quiz-fullscreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0a092d; z-index: 1000; display: none; flex-direction: column;
            align-items: center; padding: 40px 20px; color: white; overflow-y: auto;
        }
        #quiz-fullscreen.active { display: flex; }

        /* 상단 진행률 바 */
        .progress-header { width: 100%; max-width: 900px; display: flex; align-items: center; margin-bottom: 30px; gap: 15px; }
        .progress-circle { background: #23b26d; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .progress-bar-container { flex: 1; display: flex; gap: 5px; }
        .progress-segment { flex: 1; height: 8px; background: #2e3856; border-radius: 4px; }
        .progress-segment.filled { background: #4255ff; }
        .progress-total { background: #45537d; padding: 8px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }

        /* 문제 카드 */
        .quiz-card {
            background-color: #2e3856; width: 100%; max-width: 900px; border-radius: 12px;
            padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; position: relative;
        }
        
        .question-category { font-size: 14px; color: #a0aabf; margin-bottom: 20px; }
        
        /* 추가된 문제 이미지 영역 */
        .quiz-image-container { text-align: center; margin-bottom: 20px; display: none; background: #1a2238; padding: 15px; border-radius: 8px; }
        .quiz-image-container img { max-width: 100%; max-height: 300px; border-radius: 4px; object-fit: contain; }

        .question-text { font-size: 24px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; word-break: keep-all; }
        
        .feedback-text { font-size: 16px; font-weight: bold; margin-bottom: 20px; height: 24px; }
        .feedback-text.incorrect { color: #ff7873; }
        .feedback-text.correct { color: #23b26d; }

        /* 4지 선다 버튼 */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn {
            background-color: #2e3856; color: #ffffff; border: 2px solid #45537d; border-radius: 8px;
            padding: 20px; font-size: 16px; text-align: left; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; line-height: 1.4;
        }
        .option-btn:hover:not(.disabled) { border-color: #ffffff; background-color: #3a4660; }
        .option-btn.disabled { cursor: default; }
        
        .option-number { font-weight: bold; color: #a0aabf; margin-right: 15px; font-size: 18px; width: 24px; text-align: center; }
        
        .option-btn.correct { border: 2px dashed #23b26d !important; background-color: rgba(35, 178, 109, 0.1) !important; }
        .option-btn.correct .option-number { color: #23b26d; }
        
        .option-btn.incorrect { border: 2px solid #ff7873 !important; background-color: rgba(255, 120, 115, 0.1) !important; }
        .option-btn.incorrect .option-number { color: #ff7873; }

        .quiz-controls { max-width: 900px; width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        
        .left-controls { display: flex; gap: 20px; align-items: center; }
        .quit-btn { background: transparent; color: #a0aabf; border: none; font-size: 15px; cursor: pointer; padding: 10px 0; }
        .quit-btn:hover { color: white; text-decoration: underline; }

        .restart-btn { background: transparent; color: #ff7873; border: none; font-size: 15px; font-weight: bold; cursor: pointer; padding: 10px 0; }
        .restart-btn:hover { color: #ff4d4d; text-decoration: underline; }

        .next-btn {
            background: #4255ff; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold;
            border-radius: 8px; cursor: pointer; display: none; transition: 0.2s;
        }
        .next-btn:hover { background: #3244d6; }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .quiz-card { padding: 20px; }
            .question-text { font-size: 18px; }
            .left-controls { flex-direction: column; gap: 5px; align-items: flex-start; }
            .quiz-controls { align-items: flex-start; }
        }
    </style>
</head>
<body>

    <!-- 바탕화면 -->
    <div id="desktop">
        <!-- 초기 로딩 메시지 -->
        <div style="color:white; padding:20px; font-size:18px; font-weight:bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">
            ☁️ 클라우드 DB 불러오는 중...
        </div>
    </div>

    <!-- 작업표시줄 -->
    <div id="taskbar">
        <div class="taskbar-btn" title="시작">🪟</div>
        <div class="taskbar-btn text-btn" onclick="changeWallpaper()">🎨 배경화면 변경</div>
        <div class="clock" id="clock">00:00 AM</div>
    </div>

    <!-- Window: DB 업로드 -->
    <div id="upload-window" class="window">
        <div class="title-bar">
            <div class="title">📁 DB Upload (Cloud)</div>
            <button class="close-btn" onclick="closeWindow('upload-window')">✕</button>
        </div>
        <div class="window-content">
            <p style="font-weight:bold; margin-bottom:10px;">JSON 파일을 업로드 하세요.</p>
            <input type="file" id="file-input" accept=".json, .txt">
            <button class="btn" onclick="closeWindow('upload-window')" style="background:#888; width:100%;">닫기</button>
        </div>
    </div>

    <!-- Window: 통계 -->
    <div id="stats-window" class="window">
        <div class="title-bar">
            <div class="title">📊 Statistics & Review</div>
            <button class="close-btn" onclick="closeWindow('stats-window')">✕</button>
        </div>
        <div class="window-content">
            <button class="btn top-120-btn" onclick="startTop120Review()">🔥 틀린 문제 TOP 120 몰아보기</button>
            <div id="stats-list"></div>
            <button class="btn" onclick="closeWindow('stats-window')" style="background:#888; width:100%;">닫기</button>
        </div>
    </div>

    <!-- Window: 사진 추가 관리자 -->
    <div id="image-window" class="window">
        <div class="title-bar">
            <div class="title">🖼️ 사진 추가 관리자</div>
            <button class="close-btn" onclick="closeWindow('image-window')">✕</button>
        </div>
        <div class="window-content" id="image-window-content"></div>
    </div>

    <!-- 퀴즈 전체화면 -->
    <div id="quiz-fullscreen">
        <div class="progress-header">
            <div class="progress-circle" id="q-current-num">1</div>
            <div class="progress-bar-container" id="progress-segments"></div>
            <div class="progress-total" id="q-total-num">100</div>
        </div>

        <div class="quiz-card">
            <div class="question-category" id="quiz-category">단원명</div>
            
            <div class="quiz-image-container" id="quiz-image-container">
                <img id="quiz-image" src="" alt="문제 첨부 이미지">
            </div>

            <div class="question-text" id="quiz-question-text">문제가 여기에 표시됩니다.</div>
            <div class="feedback-text" id="quiz-feedback-text"></div>
            <div class="options-grid" id="quiz-options-grid"></div>
        </div>
        
        <div class="quiz-controls">
            <div class="left-controls">
                <button class="quit-btn" onclick="quitQuiz()">⚑ 퀴즈 종료 (자동저장)</button>
                <button class="restart-btn" onclick="resetProgress()">↺ 학습 새로 시작하기</button>
            </div>
            <button class="next-btn" id="next-btn" onclick="goToNextQuestion()">다음 문제로 이동 (Enter) ➔</button>
        </div>
    </div>

    <!-- ==================================================
         Firebase 설정 및 스크립트 (모듈화)
         ================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, writeBatch, getDoc, deleteField } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB1NUyTsO8-q6zMgy6JBJUnAuaTGhUK5xI",
            authDomain: "my-safety-quiz.firebaseapp.com",
            projectId: "my-safety-quiz",
            storageBucket: "my-safety-quiz.firebasestorage.app",
            messagingSenderId: "976388519071",
            appId: "1:976388519071:web:ba2a22c0ab093e58b55eaa"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 전역 상태 변수
        window.problemDB = [];
        window.progressDB = {};

        // 클라우드 데이터 로드
        async function loadCloudData() {
            try {
                // 진도율 로드
                const progSnap = await getDoc(doc(db, "settings", "progress"));
                if (progSnap.exists()) window.progressDB = progSnap.data();

                // 문제 데이터 로드
                const querySnapshot = await getDocs(collection(db, "problems"));
                window.problemDB = [];
                querySnapshot.forEach((document) => {
                    window.problemDB.push({ id: document.id, ...document.data() });
                });
                
                window.renderDesktop();
            } catch (error) {
                console.error("Firebase 로딩 에러:", error);
                alert("클라우드 데이터베이스 연결에 실패했습니다.");
            }
        }

        // 앱 초기 실행
        loadCloudData();

        // 진행 상황 저장 함수 (Firestore)
        window.saveProgress = async function() {
            try {
                await setDoc(doc(db, "settings", "progress"), window.progressDB);
            } catch (e) {
                console.error("Progress 저장 오류:", e);
            }
        }

        /* ==================================================
           UI 및 이벤트 함수 (window 객체에 바인딩)
           ================================================== */

        const wallpapers = [
            "https://images.unsplash.com/photo-1617042375876-a13e36732a04?q=80&w=1920&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=1920&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1506744626753-eda8151a1571?q=80&w=1920&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920&auto=format&fit=crop"
        ];
        let currentWallpaperIdx = 0;
        window.changeWallpaper = function() {
            currentWallpaperIdx = (currentWallpaperIdx + 1) % wallpapers.length;
            document.body.style.backgroundImage = `url('${wallpapers[currentWallpaperIdx]}')`;
        }

        window.renderDesktop = function() {
            const desktop = document.getElementById('desktop');
            desktop.innerHTML = `
                <div class="desktop-icon" onclick="openWindow('upload-window')">
                    <div class="icon-img">⚙️</div>
                    <div class="icon-text">DB 업로드</div>
                </div>
                <div class="desktop-icon" onclick="openStats()">
                    <div class="icon-img">📊</div>
                    <div class="icon-text">오답 통계</div>
                </div>
                <div class="desktop-icon" onclick="openImageManager()">
                    <div class="icon-img">🖼️</div>
                    <div class="icon-text">사진 추가</div>
                </div>
            `;
            
            const categories = [...new Set(window.problemDB.map(p => p.category))];
            categories.forEach(category => {
                desktop.innerHTML += `
                    <div class="desktop-icon" onclick="startQuizByCategory('${category}')">
                        <div class="icon-img">📁</div>
                        <div class="icon-text">
                            ${category}
                            <span class="rename-btn" title="이름 변경" onclick="event.stopPropagation(); renameCategory('${category}')">✏️</span>
                        </div>
                    </div>
                `;
            });
        }

        window.renameCategory = async function(oldName) {
            const newName = prompt(`'${oldName}'의 새 이름을 입력하세요:`, oldName);
            if (newName && newName.trim() !== "" && newName !== oldName) {
                const batch = writeBatch(db);
                window.problemDB.forEach(p => {
                    if (p.category === oldName) {
                        p.category = newName.trim();
                        batch.update(doc(db, "problems", p.id), { category: p.category });
                    }
                });

                if (window.progressDB[oldName] !== undefined) {
                    window.progressDB[newName.trim()] = window.progressDB[oldName];
                    delete window.progressDB[oldName];
                    window.saveProgress();
                }
                
                await batch.commit();
                window.renderDesktop();
            }
        }

        window.openWindow = function(id) { document.querySelectorAll('.window').forEach(w => w.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        window.closeWindow = function(id) { document.getElementById(id).classList.remove('active'); }
        
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // 파일 업로드 (Firestore Batch 활용)
        document.getElementById('file-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const fileNameCategory = file.name.replace(/\.[^/.]+$/, "");
            const reader = new FileReader();
            
            reader.onload = async function(event) {
                try {
                    const uploadedData = JSON.parse(event.target.result);
                    const batch = writeBatch(db);
                    
                    document.getElementById('upload-window').querySelector('.window-content').innerHTML = '<p>데이터를 클라우드에 저장하는 중입니다...</p>';

                    uploadedData.forEach(item => {
                        if (item.question && item.answer) {
                            const newDocRef = doc(collection(db, "problems"));
                            const newObj = {
                                category: fileNameCategory, 
                                question: item.question, 
                                answer: String(item.answer).trim(), 
                                wrongCount: item.wrongCount || 0 
                            };
                            batch.set(newDocRef, newObj);
                            window.problemDB.push({ id: newDocRef.id, ...newObj });
                        }
                    });
                    
                    await batch.commit();
                    window.renderDesktop();
                    alert(`업로드 성공!`);
                    window.closeWindow('upload-window');
                    
                    // 업로드 윈도우 내용 원상복구
                    document.getElementById('upload-window').querySelector('.window-content').innerHTML = `
                        <p style="font-weight:bold; margin-bottom:10px;">JSON 파일을 업로드 하세요.</p>
                        <input type="file" id="file-input" accept=".json, .txt">
                        <button class="btn" onclick="closeWindow('upload-window')" style="background:#888; width:100%;">닫기</button>
                    `;
                } catch (error) { 
                    alert("업로드 처리 중 오류 발생!"); 
                    console.error(error);
                }
            };
            reader.readAsText(file);
        });

        window.openStats = function() {
            const statsList = document.getElementById('stats-list');
            statsList.innerHTML = '';
            const categories = [...new Set(window.problemDB.map(p => p.category))];
            if (categories.length === 0) { statsList.innerHTML = '<p style="color:#666;">데이터가 없습니다.</p>'; } 
            else {
                categories.forEach(cat => {
                    const categoryProblems = window.problemDB.filter(p => p.category === cat);
                    const wrongCountSum = categoryProblems.filter(p => p.wrongCount > 0).length;
                    statsList.innerHTML += `
                        <div class="stat-group">
                            <div class="stat-group-title">📁 ${cat}</div>
                            <div class="stat-group-count">오답 문항: ${wrongCountSum}개 / 총 ${categoryProblems.length}개</div>
                        </div>`;
                });
            }
            window.openWindow('stats-window');
        }

        /* 사진 추가 관리자 */
        window.openImageManager = function() {
            const content = document.getElementById('image-window-content');
            const categories = [...new Set(window.problemDB.map(p => p.category))];
            
            let html = `<p style="font-weight:bold; margin-bottom:15px; font-size:16px;">사진을 추가할 문제 묶음(카테고리)을 선택하세요.</p>`;
            if(categories.length === 0) {
                html += `<p style="color:#666;">업로드된 문제가 없습니다.</p>`;
            } else {
                html += `<div style="border-top:2px solid #eee;">`;
                categories.forEach(cat => {
                    html += `
                        <div class="list-item" onclick="showImageQuestions('${cat}')">
                            <span style="font-size:20px;">📁</span>
                            <span class="list-title">${cat}</span>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            content.innerHTML = html;
            window.openWindow('image-window');
        }

        window.showImageQuestions = function(category) {
            const content = document.getElementById('image-window-content');
            let html = `
                <button class="btn" style="background:#eee; color:#333; margin-top:0; margin-bottom:15px;" onclick="openImageManager()">⬅️ 카테고리 목록으로 돌아가기</button>
                <p style="font-weight:bold; margin-bottom:15px; font-size:15px;">[${category}] 사진을 추가할 문제를 클릭하세요.</p>
                <div style="border-top:2px solid #eee;">
            `;
            window.problemDB.forEach((p, globalIdx) => {
                if (p.category === category) {
                    const statusClass = p.image ? 'has-img' : '';
                    const statusText = p.image ? '사진 있음' : '사진 없음';
                    const previewText = p.question.split('/')[0].substring(0, 30) + '...';
                    html += `
                        <div class="list-item" onclick="openImageUploader(${globalIdx})">
                            <span class="img-status ${statusClass}">${statusText}</span>
                            <div style="display:flex; flex-direction:column; gap:5px;">
                                <span class="list-preview">${previewText}</span>
                            </div>
                        </div>
                    `;
                }
            });
            html += `</div>`;
            content.innerHTML = html;
        }

        window.openImageUploader = function(globalIdx) {
            const content = document.getElementById('image-window-content');
            const p = window.problemDB[globalIdx];
            const parsedQuestion = parseQuestionAndOptions(p.question).mainQuestion;
            
            let html = `
                <button class="btn" style="background:#eee; color:#333; margin-top:0; margin-bottom:15px;" onclick="showImageQuestions('${p.category}')">⬅️ 문제 목록으로 돌아가기</button>
                <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:20px;">
                    <span style="font-size:12px; color:#888;">대상 문제</span><br>
                    <strong>${parsedQuestion}</strong>
                </div>
            `;
            if (p.image) {
                html += `
                    <div style="text-align:center; background:#eee; padding:10px; border-radius:8px; margin-bottom:10px;">
                        <img src="${p.image}" style="max-width:100%; max-height:200px; border-radius:4px;"><br>
                        <button class="btn" style="background:#e81123;" onclick="deleteImage(${globalIdx})">🗑️ 현재 사진 삭제</button>
                    </div>
                `;
            } else {
                html += `<p style="color:#666; font-size:14px; margin-bottom:10px;">등록된 사진이 없습니다.</p>`;
            }
            html += `<input type="file" accept="image/*" onchange="uploadAndCompressImage(event, ${globalIdx})">`;
            content.innerHTML = html;
        }

        window.uploadAndCompressImage = function(event, globalIdx) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64Img = canvas.toDataURL('image/jpeg', 0.7);
                    window.problemDB[globalIdx].image = base64Img; 
                    
                    // Firebase 업데이트
                    await updateDoc(doc(db, "problems", window.problemDB[globalIdx].id), { image: base64Img });
                    
                    window.openImageUploader(globalIdx);
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.deleteImage = async function(globalIdx) {
            if(confirm("정말 이 사진을 삭제하시겠습니까?")) {
                const targetId = window.problemDB[globalIdx].id;
                delete window.problemDB[globalIdx].image;
                
                await updateDoc(doc(db, "problems", targetId), { image: deleteField() });
                window.openImageUploader(globalIdx);
            }
        }

        /* 퀴즈 실행 로직 */
        let currentQuizSession = [];
        let currentQuestionIndex = 0;
        let isAnswerSubmitted = false;
        let currentCategoryName = "";
        let isTop120Mode = false;

        window.startTop120Review = function() {
            isTop120Mode = true;
            currentQuizSession = [...window.problemDB].filter(p => p.wrongCount > 0).sort((a, b) => b.wrongCount - a.wrongCount).slice(0, 120);
            if (currentQuizSession.length === 0) return alert('틀린 문제가 없습니다!');
            currentCategoryName = "TOP_120_REVIEW";
            currentQuestionIndex = window.progressDB[currentCategoryName] || 0;
            if (currentQuestionIndex >= currentQuizSession.length) currentQuestionIndex = 0;
            window.closeWindow('stats-window');
            document.getElementById('quiz-fullscreen').classList.add('active');
            renderQuestion();
        }

        window.startQuizByCategory = function(category) {
            isTop120Mode = false;
            currentCategoryName = category;
            currentQuizSession = window.problemDB.filter(p => p.category === category);
            if (currentQuizSession.length === 0) return alert('문제가 없습니다.');
            
            currentQuestionIndex = window.progressDB[category] || 0;
            if(currentQuestionIndex >= currentQuizSession.length) {
                currentQuestionIndex = 0;
            }
            document.getElementById('quiz-fullscreen').classList.add('active');
            renderQuestion();
        }

        window.quitQuiz = function() {
            document.getElementById('quiz-fullscreen').classList.remove('active');
        }

        window.resetProgress = function() {
            const confirmReset = confirm("정말 이 단원의 학습을 새로 시작하시겠습니까?\n저장된 학습 진도가 모두 초기화되며 1번 문제부터 다시 풀게 됩니다.");
            if (confirmReset) {
                delete window.progressDB[currentCategoryName];
                window.saveProgress();
                
                currentQuestionIndex = 0;
                renderQuestion();
            }
        }

        function parseQuestionAndOptions(fullText) {
            let mainQuestion = fullText;
            let options = [];
            if (fullText.includes('/')) {
                const parts = fullText.split('/');
                mainQuestion = parts[0].trim();
                const optionsString = parts.slice(1).join('/').trim();
                const regex = /①(.*?)(?=②|$)②(.*?)(?=③|$)③(.*?)(?=④|$)④(.*)/;
                const match = optionsString.match(regex);
                if (match) { options = [ match[1].trim(), match[2].trim(), match[3].trim(), match[4].trim() ]; } 
                else { options = ["선지 1", "선지 2", "선지 3", "선지 4"]; }
            } else { options = ["예(O)", "아니오(X)", "모르겠습니다", "정답 확인"]; }
            return { mainQuestion, options };
        }

        function renderQuestion() {
            isAnswerSubmitted = false;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('quiz-feedback-text').innerHTML = '';
            
            const q = currentQuizSession[currentQuestionIndex];
            const parsed = parseQuestionAndOptions(q.question);

            document.getElementById('q-current-num').innerText = currentQuestionIndex + 1;
            document.getElementById('q-total-num').innerText = currentQuizSession.length;
            
            const segmentContainer = document.getElementById('progress-segments');
            segmentContainer.innerHTML = '';
            const progressRatio = (currentQuestionIndex + 1) / currentQuizSession.length;
            for(let i=1; i<=5; i++) {
                const seg = document.createElement('div');
                seg.className = 'progress-segment';
                if (progressRatio >= (i / 5) || (i===1 && progressRatio > 0)) seg.classList.add('filled');
                segmentContainer.appendChild(seg);
            }

            const catTitle = isTop120Mode ? "[오답 노트 TOP 120]" : `[단원] ${q.category}`;
            document.getElementById('quiz-category').innerText = catTitle;
            document.getElementById('quiz-question-text').innerText = parsed.mainQuestion;

            const imgContainer = document.getElementById('quiz-image-container');
            const imgElement = document.getElementById('quiz-image');
            if (q.image) {
                imgElement.src = q.image;
                imgContainer.style.display = 'block'; 
            } else {
                imgElement.src = "";
                imgContainer.style.display = 'none'; 
            }

            const grid = document.getElementById('quiz-options-grid');
            grid.innerHTML = '';
            
            parsed.options.forEach((optText, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.dataset.text = optText;
                btn.dataset.num = idx + 1;
                btn.innerHTML = `<span class="option-number">${idx+1}</span> <span>${optText}</span>`;
                btn.onclick = () => submitAnswer(btn, optText, q.answer, idx + 1);
                grid.appendChild(btn);
            });
        }

        function submitAnswer(btnElement, selectedText, correctAnswer, selectedNumber) {
            if (isAnswerSubmitted) return;
            isAnswerSubmitted = true;

            const currentProblem = currentQuizSession[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            const checkIsCorrect = (text, num) => {
                const symbols = ['①','②','③','④'];
                return correctAnswer.includes(text) || correctAnswer.includes(String(num)) || correctAnswer.includes(symbols[num-1]);
            };

            const isCorrect = checkIsCorrect(selectedText, selectedNumber);
            const feedbackEl = document.getElementById('quiz-feedback-text');
            allBtns.forEach(b => b.classList.add('disabled'));

            if (isCorrect) {
                btnElement.classList.add('correct');
                btnElement.querySelector('.option-number').innerText = '✓';
                feedbackEl.innerText = "잘 하셨어요! 완벽합니다.";
                feedbackEl.className = 'feedback-text correct';
            } else {
                btnElement.classList.add('incorrect');
                btnElement.querySelector('.option-number').innerText = '✕';
                feedbackEl.innerText = "걱정하지 마세요, 아직 배우고 있잖아요!";
                feedbackEl.className = 'feedback-text incorrect';
                
                // 오답 처리 시 Firebase 업데이트
                currentProblem.wrongCount++;
                updateDoc(doc(db, "problems", currentProblem.id), { wrongCount: currentProblem.wrongCount });

                allBtns.forEach(b => {
                    if (checkIsCorrect(b.dataset.text, Number(b.dataset.num))) {
                        b.classList.add('correct');
                        b.querySelector('.option-number').innerText = '✓';
                    }
                });
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && isAnswerSubmitted && document.getElementById('quiz-fullscreen').classList.contains('active')) {
                window.goToNextQuestion();
            }
        });

        window.goToNextQuestion = function() {
            currentQuestionIndex++;
            window.progressDB[currentCategoryName] = currentQuestionIndex;
            window.saveProgress(); // Firebase 진행률 업데이트

            if (currentQuestionIndex < currentQuizSession.length) {
                renderQuestion();
            } else {
                delete window.progressDB[currentCategoryName];
                window.saveProgress();
                alert("🎉 퀴즈 세션이 모두 완료되었습니다!");
                window.quitQuiz();
            }
        }
    </script>
</body>
</html>
